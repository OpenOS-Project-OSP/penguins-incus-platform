#
# Incus profile for imt-managed macOS VMs.
#
# This profile carries only the macOS-specific QEMU overrides and network
# configuration.  Disk devices (macos-disk, opencore, installer) are attached
# per-instance by 'imt vm create' so that multiple VMs can coexist without
# sharing storage volumes.
#
# Import with:
#   incus profile create macos-kvm
#   incus profile edit macos-kvm < incus/profile.yaml
#
# Or let 'imt vm create' handle it automatically.

name: macos-kvm

config:
  # Resource limits are set per-instance by 'imt vm create'.
  # Defaults here act as a fallback if the profile is applied manually.
  limits.cpu: "4"
  limits.memory: 4GiB
  security.secureboot: "false"

  # Override Incus's default pflash drives with the Apple-compatible OVMF
  # firmware.  The paths below are written by 'imt image build' (via
  # image-pipeline/build-image.sh) and 'imt vm create'.
  raw.qemu.conf: |
    [drive "pflash0"]
    if = "pflash"
    format = "raw"
    readonly = "on"
    file = "/var/lib/macos-kvm/firmware/OVMF_CODE_4M.fd"

    [drive "pflash1"]
    if = "pflash"
    format = "raw"
    file = "/var/lib/macos-kvm/firmware/OVMF_VARS-1920x1080.fd"

  # Apple SMC OSK, machine type, CPU flags, and audio required for macOS.
  # Appended to the QEMU command line that Incus generates.
  raw.qemu: >-
    -device isa-applesmc,osk=ourhardworkbythesewordsguardedpleasedontsteal(c)AppleComputerInc
    -smbios type=2
    -machine q35
    -cpu Skylake-Client,kvm=on,vendor=GenuineIntel,+invtsc,vmware-cpuid-freq=on,+ssse3,+sse4.2,+popcnt,+avx,+aes,+xsave,+xsaveopt,check
    -device ich9-intel-hda
    -device hda-duplex

devices:
  # Managed bridge for internet access during macOS installation and activation.
  # Run 'incus network list' to confirm the bridge name on your system
  # (typically incusbr0); change the 'network' value if yours differs.
  eth0:
    type: nic
    network: incusbr0
    name: eth0

description: "imt macOS KVM profile — QEMU overrides and network only; disks attached per-instance"
