# Incus profile for Waydroid containers.
#
# Waydroid requires binder and ashmem kernel modules, nested containers,
# and privileged access to /dev/binder and /dev/ashmem.
#
# Apply with:
#   incus profile create waydroid
#   incus profile edit waydroid < profiles/waydroid/waydroid.yaml
#
# Or let 'kim provision waydroid create' handle it automatically.

description: Waydroid Android container profile

config:
  security.nesting: "true"
  security.privileged: "true"

  # Binder and ashmem kernel modules required by Waydroid
  linux.kernel_modules: binder_linux,ashmem_linux

  # AppArmor unconfined — Waydroid needs broad device access
  raw.lxc: |
    lxc.apparmor.profile = unconfined
    lxc.cap.drop =
    lxc.cgroup.devices.allow = a

devices:
  root:
    type: disk
    path: /
    pool: default
    size: 40GB

  # Binder IPC device — core Waydroid requirement
  binder:
    type: unix-char
    path: /dev/binder
    source: /dev/binder

  # Ashmem shared memory — required by Android runtime
  ashmem:
    type: unix-char
    path: /dev/ashmem
    source: /dev/ashmem

  # hwbinder — required for hardware abstraction layer (HAL)
  hwbinder:
    type: unix-char
    path: /dev/hwbinder
    source: /dev/hwbinder
    optional: "true"

  # vndbinder — required for vendor services
  vndbinder:
    type: unix-char
    path: /dev/vndbinder
    source: /dev/vndbinder
    optional: "true"

  # Wayland socket — for Waydroid display output on the host compositor
  wayland-socket:
    type: disk
    source: /run/user/1000/wayland-0
    path: /run/user/1000/wayland-0
    optional: "true"

  # PipeWire socket — for Android audio output
  pipewire-socket:
    type: disk
    source: /run/user/1000/pipewire-0
    path: /run/user/1000/pipewire-0
    optional: "true"

  # ADB over TCP proxy — allows host to reach ADB inside the container
  adb:
    type: proxy
    listen: tcp:127.0.0.1:5555
    connect: tcp:0.0.0.0:5555

  # Default NIC
  eth0:
    type: nic
    network: incusbr0
    name: eth0
