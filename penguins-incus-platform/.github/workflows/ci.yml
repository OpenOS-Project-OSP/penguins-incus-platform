name: CI

on:
  push:
    branches: [main, "feat/**"]
  pull_request:
    branches: [main]

jobs:

  # ── Python daemon + CLI ──────────────────────────────────────────────────────
  python:
    name: Python (daemon + CLI)
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        component: [daemon, cli]
    defaults:
      run:
        working-directory: penguins-incus-platform/${{ matrix.component }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check kim

      - name: Type-check (mypy)
        run: mypy kim

      - name: Test (pytest)
        run: pytest --tb=short -q --asyncio-mode=auto

  # ── Profile YAML validation ───────────────────────────────────────────────────
  profiles:
    name: Validate profile presets
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pyyaml
        run: pip install pyyaml

      - name: Validate all profile YAML files
        run: |
          python3 - <<'EOF'
          import pathlib, sys, yaml
          root = pathlib.Path("penguins-incus-platform/profiles")
          errors = []
          for f in sorted(root.rglob("*.yaml")):
              try:
                  data = yaml.safe_load(f.read_text())
                  if not isinstance(data, dict):
                      errors.append(f"{f}: root must be a mapping")
              except yaml.YAMLError as e:
                  errors.append(f"{f}: {e}")
          if errors:
              for e in errors:
                  print("ERROR:", e, file=sys.stderr)
              sys.exit(1)
          print(f"OK: {sum(1 for _ in root.rglob('*.yaml'))} profile files validated")
          EOF

  # ── Web UI ───────────────────────────────────────────────────────────────────
  web:
    name: Web UI (TypeScript)
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: penguins-incus-platform/ui-web

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install
        run: npm install

      - name: Type-check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

  # ── QML / C++ ────────────────────────────────────────────────────────────────
  qml:
    name: QML / C++ (CMake configure)
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Install Qt6 + build tools
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q \
            cmake ninja-build \
            qt6-base-dev qt6-declarative-dev \
            qt6-websockets-dev libdbus-1-dev

      - name: CMake configure
        run: |
          cmake -B penguins-incus-platform/ui-qml/build \
                -S penguins-incus-platform/ui-qml \
                -G Ninja \
                -DCMAKE_BUILD_TYPE=Release \
                -DBUILD_TESTS=OFF

      - name: CMake build
        run: cmake --build penguins-incus-platform/ui-qml/build --parallel
